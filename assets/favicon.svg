<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="two coupled baduk stones">
  <defs>
    <radialGradient id="fb" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#838996"/>
      <stop offset="44%" stop-color="#2a2e36"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <radialGradient id="fw" cx="36%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="68%" stop-color="#eef1f6"/>
      <stop offset="100%" stop-color="#c2c8d3"/>
    </radialGradient>
  </defs>
  <!-- black stone (behind) -->
  <circle cx="39" cy="58" r="33" fill="url(#fb)"/>
  <ellipse cx="30" cy="46" rx="11" ry="7" fill="#ffffff" opacity="0.12"/>
  <!-- white stone (front), the coupling overlap -->
  <circle cx="63" cy="42" r="33" fill="url(#fw)" stroke="#9aa3b2" stroke-width="0.8"/>
  <ellipse cx="54" cy="30" rx="11" ry="7" fill="#ffffff" opacity="0.55"/>
</svg>
